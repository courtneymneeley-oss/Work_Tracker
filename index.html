<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#0a0a0a" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Work Tracker" />
  <title>Work Tracker</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;500;700&display=swap" rel="stylesheet" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #0f0f0f;
      --bg2:      #1a1a1a;
      --bg3:      #242424;
      --border:   rgba(255,255,255,0.08);
      --border2:  rgba(255,255,255,0.14);
      --text:     #f0ede8;
      --muted:    #888580;
      --hint:     #555250;
      --accent:   #1D9E75;
      --accent-l: rgba(29,158,117,0.12);
      --accent-t: #4ecba0;
      --warn:     #e05a4a;
      --warn-l:   rgba(224,90,74,0.12);
      --amber:    #d4893a;
      --amber-l:  rgba(212,137,58,0.12);
      --r:        14px;
      --rm:       9px;
    }

    html { height: 100%; }
    body {
      font-family: 'Syne', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100%;
      padding-bottom: 80px;
    }

    .nav {
      position: fixed; bottom: 0; left: 0; right: 0;
      background: var(--bg2);
      border-top: 0.5px solid var(--border2);
      display: flex; z-index: 50;
      padding-bottom: env(safe-area-inset-bottom);
    }
    .nav-btn {
      flex: 1; padding: 12px 0 10px;
      display: flex; flex-direction: column;
      align-items: center; gap: 4px;
      cursor: pointer; background: none; border: none;
      color: var(--hint); font-family: 'Syne', sans-serif;
      font-size: 10px; font-weight: 500;
      letter-spacing: 0.05em; text-transform: uppercase;
      transition: color 0.15s;
    }
    .nav-btn.active { color: var(--accent-t); }
    .nav-icon { font-size: 18px; line-height: 1; }

    .page { display: none; max-width: 480px; margin: 0 auto; padding: 2rem 1.25rem 1rem; }
    .page.active { display: block; }

    .header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 2rem; }
    .header h1 { font-size: 18px; font-weight: 700; letter-spacing: -0.3px; }
    .header-sub { font-size: 12px; color: var(--hint); margin-top: 2px; }

    .settings-btn {
      width: 34px; height: 34px; border-radius: 50%;
      background: var(--bg2); border: 0.5px solid var(--border2);
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; font-size: 16px;
    }
    .settings-btn:hover { background: var(--bg3); }

    .card { background: var(--bg2); border: 0.5px solid var(--border); border-radius: var(--r); padding: 1.25rem; margin-bottom: 1rem; }

    .lbl { font-size: 10px; font-weight: 500; letter-spacing: 0.1em; text-transform: uppercase; color: var(--hint); margin-bottom: 8px; }

    .select-wrap { position: relative; }
    .select-wrap select {
      width: 100%; appearance: none;
      background: var(--bg3); border: 0.5px solid var(--border2);
      border-radius: var(--rm); padding: 11px 36px 11px 13px;
      font-size: 14px; font-family: 'Syne', sans-serif;
      color: var(--text); cursor: pointer;
    }
    .select-wrap select option { background: #1a1a1a; }
    .select-wrap::after { content: ''; position: absolute; right: 13px; top: 50%; transform: translateY(-50%); border: 4px solid transparent; border-top-color: var(--muted); pointer-events: none; }
    .select-wrap select:focus { outline: none; border-color: var(--accent); }

    .task-input { width: 100%; background: var(--bg3); border: 0.5px solid var(--border2); border-radius: var(--rm); padding: 11px 13px; font-size: 14px; font-family: 'Syne', sans-serif; color: var(--text); margin-top: 8px; }
    .task-input::placeholder { color: var(--hint); }
    .task-input:focus { outline: none; border-color: var(--accent); }

    .timer-block { text-align: center; padding: 2rem 0 1.5rem; }
    .time-big { font-family: 'DM Mono', monospace; font-size: 58px; font-weight: 400; letter-spacing: 3px; color: var(--text); line-height: 1; transition: color 0.3s; }
    .time-big.running { color: var(--accent-t); }
    .time-big.paused  { color: var(--amber); }

    .badge { display: inline-flex; align-items: center; gap: 6px; font-size: 11px; font-weight: 500; padding: 5px 12px; border-radius: 99px; margin-top: 14px; background: var(--bg3); color: var(--muted); letter-spacing: 0.04em; }
    .badge.running { background: var(--accent-l); color: var(--accent-t); }
    .badge.paused  { background: var(--amber-l);  color: var(--amber); }

    .dot { width: 6px; height: 6px; border-radius: 50%; background: currentColor; }
    .dot.pulse { animation: pulse 1.3s infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.2} }

    .meta-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin: 1rem 0; }
    .meta-cell { background: var(--bg3); border-radius: var(--rm); padding: 10px 12px; }
    .meta-cell .ml { font-size: 10px; color: var(--hint); text-transform: uppercase; letter-spacing: 0.07em; }
    .meta-cell .mv { font-size: 13px; font-weight: 500; margin-top: 3px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

    .btn-start { width: 100%; padding: 15px; border-radius: var(--rm); font-family: 'Syne', sans-serif; font-size: 15px; font-weight: 700; cursor: pointer; border: none; transition: all 0.15s; letter-spacing: 0.02em; }
    .btn-start.idle    { background: var(--text); color: #0f0f0f; }
    .btn-start.running { background: var(--amber-l); color: var(--amber); border: 0.5px solid var(--amber); }
    .btn-start.paused  { background: var(--accent-l); color: var(--accent-t); border: 0.5px solid var(--accent); }
    .btn-start:hover { opacity: 0.85; transform: translateY(-1px); }
    .btn-start:active { transform: scale(0.98); }
    .btn-start:disabled { opacity: 0.3; cursor: not-allowed; transform: none; }

    .btn-stop { width: 100%; padding: 13px; border-radius: var(--rm); font-family: 'Syne', sans-serif; font-size: 14px; font-weight: 500; cursor: pointer; border: 0.5px solid var(--warn); background: var(--warn-l); color: var(--warn); transition: all 0.15s; margin-top: 8px; }
    .btn-stop:hover { opacity: 0.8; }
    .btn-stop:active { transform: scale(0.98); }
    .btn-stop:disabled { opacity: 0.25; cursor: not-allowed; transform: none; }

    .status-msg { font-size: 12px; padding: 9px 13px; border-radius: var(--rm); margin-top: 8px; display: none; line-height: 1.5; }
    .status-msg.success { background: var(--accent-l); color: var(--accent-t); display: block; }
    .status-msg.error   { background: var(--warn-l);   color: var(--warn);    display: block; }
    .status-msg.info    { background: var(--amber-l);  color: var(--amber);   display: block; }

    .sheet-input { width: 100%; background: var(--bg3); border: 0.5px solid var(--border2); border-radius: var(--rm); padding: 10px 13px; font-size: 13px; font-family: 'Syne', monospace; color: var(--text); margin-bottom: 6px; }
    .sheet-input::placeholder { color: var(--hint); }
    .sheet-input:focus { outline: none; border-color: var(--accent); }
    .hint-text { font-size: 11px; color: var(--hint); line-height: 1.6; }

    .log-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
    .clear-btn { font-size: 11px; color: var(--hint); background: none; border: none; cursor: pointer; font-family: 'Syne', sans-serif; }
    .clear-btn:hover { color: var(--warn); }

    .log-entry { display: flex; align-items: flex-start; gap: 10px; padding: 10px 0; border-bottom: 0.5px solid var(--border); font-size: 13px; }
    .log-entry:last-child { border-bottom: none; }
    .log-pip { width: 7px; height: 7px; border-radius: 50%; background: var(--accent); margin-top: 5px; flex-shrink: 0; }
    .log-main { flex: 1; min-width: 0; }
    .log-cat  { font-weight: 500; }
    .log-sub  { color: var(--muted); font-size: 11px; margin-top: 2px; }
    .log-dur  { font-family: 'DM Mono', monospace; font-size: 12px; color: var(--muted); white-space: nowrap; padding-top: 2px; }
    .empty-log { font-size: 13px; color: var(--hint); text-align: center; padding: 1.5rem 0; }

    /* Analytics */
    .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 1rem; }
    .stat-cell { background: var(--bg2); border: 0.5px solid var(--border); border-radius: var(--r); padding: 1rem 1.1rem; }
    .stat-cell .sl { font-size: 10px; color: var(--hint); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 6px; }
    .stat-cell .sv { font-size: 22px; font-weight: 700; font-family: 'DM Mono', monospace; }
    .stat-cell .ss { font-size: 11px; color: var(--muted); margin-top: 3px; }

    .chart-card { background: var(--bg2); border: 0.5px solid var(--border); border-radius: var(--r); padding: 1.25rem; margin-bottom: 1rem; }
    .chart-title { font-size: 10px; font-weight: 500; color: var(--hint); text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 1rem; }
    .chart-wrap { position: relative; height: 200px; }

    .bar-row { margin-bottom: 12px; }
    .bar-row:last-child { margin-bottom: 0; }
    .bar-label { display: flex; justify-content: space-between; font-size: 12px; margin-bottom: 5px; }
    .bar-label span:first-child { color: var(--text); }
    .bar-label span:last-child  { color: var(--muted); font-family: 'DM Mono', monospace; font-size: 11px; }
    .bar-track { background: var(--bg3); border-radius: 4px; height: 5px; overflow: hidden; }
    .bar-fill  { height: 100%; border-radius: 4px; transition: width 0.6s ease; }

    .refresh-btn { display: flex; align-items: center; gap: 6px; font-size: 12px; color: var(--accent-t); background: none; border: none; cursor: pointer; font-family: 'Syne', sans-serif; padding: 0; }
    .refresh-btn:hover { opacity: 0.7; }

    .loading-state { text-align: center; padding: 3rem 0; color: var(--hint); font-size: 13px; line-height: 1.8; }

    .donut-wrap { display: flex; align-items: center; gap: 1.5rem; }
    .donut-canvas { flex-shrink: 0; }
    .donut-legend { flex: 1; }
    .legend-row { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; font-size: 12px; }
    .legend-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }

    /* Settings */
    .panel-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.6); display: none; z-index: 100; backdrop-filter: blur(4px); }
    .panel-overlay.open { display: flex; align-items: flex-end; justify-content: center; }
    .panel { background: var(--bg2); border: 0.5px solid var(--border2); border-radius: 18px 18px 0 0; padding: 1.5rem 1.25rem 2.5rem; width: 100%; max-width: 480px; animation: slideUp 0.25s ease; }
    @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
    .panel-handle { width: 36px; height: 4px; background: var(--border2); border-radius: 2px; margin: 0 auto 1.5rem; }
    .panel h2 { font-size: 16px; font-weight: 700; margin-bottom: 1.25rem; }
    .panel-close { float: right; background: none; border: none; color: var(--muted); cursor: pointer; font-size: 18px; margin-top: -2px; }
    .divider { height: 0.5px; background: var(--border); margin: 1rem 0; }
    .save-btn { width:100%; padding:12px; border-radius:9px; font-family:'Syne',sans-serif; font-size:14px; font-weight:700; cursor:pointer; border:none; background:var(--text); color:#0f0f0f; }
  </style>
</head>
<body>

<div class="page active" id="page-tracker">
  <div class="header">
    <div>
      <h1>Work Tracker</h1>
      <div class="header-sub" id="todayDate"></div>
    </div>
    <div class="settings-btn" onclick="openSettings()">⚙</div>
  </div>

  <div class="card">
    <div class="lbl">Category</div>
    <div class="select-wrap">
      <select id="catSelect">
        <option value="">— Select a category —</option>
        <optgroup label="Design">
          <option value="Design|Rough Draft">Design · Rough Draft</option>
          <option value="Design|Wireframing">Design · Wireframing</option>
          <option value="Design|UI Design">Design · UI Design</option>
          <option value="Design|Branding &amp; Identity">Design · Branding &amp; Identity</option>
          <option value="Design|Prototyping">Design · Prototyping</option>
          <option value="Design|Client Review">Design · Client Review</option>
          <option value="Design|Revisions">Design · Revisions</option>
        </optgroup>
        <optgroup label="Development">
          <option value="Development|HTML &amp; CSS">Development · HTML &amp; CSS</option>
          <option value="Development|JavaScript">Development · JavaScript</option>
          <option value="Development|WordPress">Development · WordPress</option>
          <option value="Development|E-Commerce">Development · E-Commerce</option>
          <option value="Development|API Integration">Development · API Integration</option>
          <option value="Development|Bug Fixes">Development · Bug Fixes</option>
          <option value="Development|Performance Optimization">Development · Performance Optimization</option>
        </optgroup>
        <optgroup label="Strategy">
          <option value="Strategy|Discovery &amp; Research">Strategy · Discovery &amp; Research</option>
          <option value="Strategy|Site Mapping">Strategy · Site Mapping</option>
          <option value="Strategy|Content Planning">Strategy · Content Planning</option>
          <option value="Strategy|SEO Planning">Strategy · SEO Planning</option>
        </optgroup>
        <optgroup label="Client Work">
          <option value="Client|Meetings &amp; Calls">Client · Meetings &amp; Calls</option>
          <option value="Client|Proposals &amp; Quotes">Client · Proposals &amp; Quotes</option>
          <option value="Client|Project Management">Client · Project Management</option>
          <option value="Client|Feedback &amp; QA">Client · Feedback &amp; QA</option>
        </optgroup>
        <optgroup label="Other">
          <option value="Other|Admin">Other · Admin</option>
          <option value="Other|Learning &amp; Research">Other · Learning &amp; Research</option>
          <option value="Other|Miscellaneous">Other · Miscellaneous</option>
        </optgroup>
      </select>
    </div>
    <input class="task-input" id="taskNote" placeholder="Task note (optional)…" maxlength="100" />
  </div>

  <div class="card">
    <div class="timer-block">
      <div class="time-big" id="timerDisplay">00:00:00</div>
      <div>
        <span class="badge" id="badge">
          <span class="dot" id="dot"></span>
          <span id="badgeText">Ready</span>
        </span>
      </div>
    </div>
    <div class="meta-grid">
      <div class="meta-cell"><div class="ml">Category</div><div class="mv" id="mCat">—</div></div>
      <div class="meta-cell"><div class="ml">Started</div><div class="mv" id="mStart">—</div></div>
    </div>
    <button class="btn-start idle" id="startBtn" onclick="toggleTimer()">Start work</button>
    <button class="btn-stop" id="stopBtn" onclick="stopWork()" disabled>Finish &amp; save session</button>
    <div class="status-msg" id="statusMsg"></div>
  </div>

  <div class="card">
    <div class="log-header">
      <div class="lbl" style="margin-bottom:0">Recent sessions</div>
      <button class="clear-btn" onclick="clearLog()">Clear all</button>
    </div>
    <div id="logList"><div class="empty-log">No sessions yet</div></div>
  </div>
</div>

<!-- ANALYTICS PAGE -->
<div class="page" id="page-analytics">
  <div class="header">
    <div>
      <h1>Analytics</h1>
      <div class="header-sub" id="analyticsRange"></div>
    </div>
    <button class="refresh-btn" onclick="loadAnalytics()">↻ Refresh</button>
  </div>
  <div id="analyticsContent">
    <div class="loading-state">Tap Refresh to load your data<br>from Google Sheets</div>
  </div>
</div>

<!-- BOTTOM NAV -->
<nav class="nav">
  <button class="nav-btn active" id="nav-tracker" onclick="showPage('tracker')">
    <span class="nav-icon">⏱</span><span>Tracker</span>
  </button>
  <button class="nav-btn" id="nav-analytics" onclick="showPage('analytics')">
    <span class="nav-icon">📊</span><span>Analytics</span>
  </button>
</nav>

<!-- SETTINGS PANEL -->
<div class="panel-overlay" id="overlay" onclick="closeSettings(event)">
  <div class="panel">
    <div class="panel-handle"></div>
    <button class="panel-close" onclick="closeSettings()">✕</button>
    <h2>Settings</h2>
    <div class="lbl">Google Sheets webhook URL</div>
    <input class="sheet-input" id="sheetUrl" placeholder="https://script.google.com/macros/s/.../exec" />
    <div class="lbl" style="margin-top:12px;">Secret key</div>
    <input class="sheet-input" id="secretKey" placeholder="your-secret-key" />
    <div class="hint-text">Paste your Apps Script web app URL. Sessions will be sent automatically on finish.</div>
    <div class="divider"></div>
    <button class="save-btn" onclick="saveSettings()">Save settings</button>
  </div>
</div>

<script>
  let timerState = 'idle', startTs = null, accumulated = 0, interval = null;
  let sessionLog = JSON.parse(localStorage.getItem('wt_log') || '[]');

  document.getElementById('sheetUrl').value = localStorage.getItem('wt_sheetUrl') || '';
  document.getElementById('secretKey').value = localStorage.getItem('wt_secretKey') || '';
  document.getElementById('todayDate').textContent = new Date().toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric'});
  renderLog();

  function showPage(name) {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
    document.getElementById('page-' + name).classList.add('active');
    document.getElementById('nav-' + name).classList.add('active');
    if (name === 'analytics') loadAnalytics();
  }

  function pad(n) { return String(n).padStart(2,'0'); }
  function fmtDur(ms) { const s=Math.floor(ms/1000); return pad(Math.floor(s/3600))+':'+pad(Math.floor((s%3600)/60))+':'+pad(s%60); }
  function fmtHrs(ms) { const h=ms/3600000; return h<1 ? Math.round(h*60)+'m' : h.toFixed(1)+'h'; }
  function fmtTime(d) { return d.toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit',hour12:true}); }
  function fmtDate(d) { return d.toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'}); }
  function getElapsed() { if(!startTs||timerState==='paused') return accumulated; return accumulated+(Date.now()-startTs); }

  function tick() { document.getElementById('timerDisplay').textContent = fmtDur(getElapsed()); }

  function setStatus(s) {
    const badge=document.getElementById('badge'), dot=document.getElementById('dot');
    badge.className='badge '+s; dot.className='dot '+(s==='running'?'pulse':'');
    document.getElementById('badgeText').textContent=s==='running'?'Running':s==='paused'?'Paused':'Ready';
    document.getElementById('timerDisplay').className='time-big '+(s==='idle'?'':s);
  }

  function toggleTimer() {
    const cat=document.getElementById('catSelect').value;
    if(timerState==='idle'){
      if(!cat){showMsg('Please select a category first','info');return;}
      timerState='running'; startTs=Date.now(); accumulated=0;
      document.getElementById('mCat').textContent=cat.split('|').join(' › ');
      document.getElementById('mStart').textContent=fmtTime(new Date());
      document.getElementById('startBtn').textContent='Pause';
      document.getElementById('startBtn').className='btn-start running';
      document.getElementById('stopBtn').disabled=false;
      interval=setInterval(tick,500); setStatus('running');
    } else if(timerState==='running'){
      timerState='paused'; accumulated+=Date.now()-startTs; startTs=null; clearInterval(interval);
      document.getElementById('startBtn').textContent='Resume';
      document.getElementById('startBtn').className='btn-start paused'; setStatus('paused');
    } else {
      timerState='running'; startTs=Date.now(); interval=setInterval(tick,500);
      document.getElementById('startBtn').textContent='Pause';
      document.getElementById('startBtn').className='btn-start running'; setStatus('running');
    }
  }

  function stopWork() {
    if(timerState==='idle') return;
    clearInterval(interval);
    const elapsed=getElapsed(), cat=document.getElementById('catSelect').value;
    const note=document.getElementById('taskNote').value.trim(), endTime=new Date();
    const entry={
      id:Date.now(), date:fmtDate(endTime),
      category:cat.split('|')[0], subcategory:cat.split('|')[1]||'',
      note, start:document.getElementById('mStart').textContent,
      end:fmtTime(endTime), durationMs:elapsed, duration:fmtDur(elapsed)
    };
    sessionLog.unshift(entry);
    localStorage.setItem('wt_log',JSON.stringify(sessionLog));
    renderLog(); sendToSheets(entry); resetTimer();
  }

  function resetTimer() {
    timerState='idle'; startTs=null; accumulated=0; clearInterval(interval);
    document.getElementById('timerDisplay').textContent='00:00:00';
    document.getElementById('timerDisplay').className='time-big';
    document.getElementById('startBtn').textContent='Start work';
    document.getElementById('startBtn').className='btn-start idle';
    document.getElementById('stopBtn').disabled=true;
    document.getElementById('mCat').textContent='—';
    document.getElementById('mStart').textContent='—';
    document.getElementById('catSelect').value='';
    document.getElementById('taskNote').value='';
    setStatus('idle');
  }

  function sendToSheets(entry) {
    const url=localStorage.getItem('wt_sheetUrl')||'';
    const key=localStorage.getItem('wt_secretKey')||'';
    if(!url){showMsg('Session saved locally. Add Sheets URL in ⚙ settings','info');return;}
    showMsg('Sending to Google Sheets…','info');
    fetch(url,{method:'POST',mode:'no-cors',headers:{'Content-Type':'application/json'},body:JSON.stringify({...entry,key})})
      .then(()=>showMsg('Saved to Google Sheets!','success'))
      .catch(()=>showMsg('Could not reach Sheets. Saved locally.','error'));
  }

  function showMsg(msg,type) {
    const el=document.getElementById('statusMsg');
    el.textContent=msg; el.className='status-msg '+type;
    clearTimeout(el._t); el._t=setTimeout(()=>{el.style.display='none';},6000);
  }

  function renderLog() {
    const list=document.getElementById('logList');
    if(!sessionLog.length){list.innerHTML='<div class="empty-log">No sessions yet</div>';return;}
    list.innerHTML=sessionLog.slice(0,10).map(e=>`
      <div class="log-entry">
        <div class="log-pip"></div>
        <div class="log-main">
          <div class="log-cat">${e.category} › ${e.subcategory}</div>
          <div class="log-sub">${e.note||e.date} · ${e.start} → ${e.end}</div>
        </div>
        <div class="log-dur">${e.duration}</div>
      </div>`).join('');
  }

  function clearLog() {
    if(!confirm('Clear all local session history?')) return;
    sessionLog=[]; localStorage.setItem('wt_log','[]'); renderLog();
  }

  function openSettings() { document.getElementById('overlay').classList.add('open'); }
  function closeSettings(e) { if(!e||e.target===document.getElementById('overlay')) document.getElementById('overlay').classList.remove('open'); }
  function saveSettings() {
    localStorage.setItem('wt_sheetUrl',document.getElementById('sheetUrl').value.trim());
    localStorage.setItem('wt_secretKey',document.getElementById('secretKey').value.trim());
    closeSettings(); showMsg('Settings saved!','success');
  }

  const CAT_COLORS = {
    'Design':      '#1D9E75',
    'Development': '#378ADD',
    'Strategy':    '#d4893a',
    'Client':      '#D4537E',
    'Other':       '#888580'
  };
  function colorFor(cat) { return CAT_COLORS[cat] || '#888580'; }

  let chartInstances = [];
  function destroyCharts() { chartInstances.forEach(c=>c.destroy()); chartInstances=[]; }

  async function loadAnalytics() {
    const url=localStorage.getItem('wt_sheetUrl')||'';
    const el=document.getElementById('analyticsContent');
    if(!url){ el.innerHTML='<div class="loading-state">Add your Google Sheets URL<br>in ⚙ Settings first</div>'; return; }
    el.innerHTML='<div class="loading-state">Loading your data…</div>';
    destroyCharts();
    let rows=[];
    try {
      const res=await fetch(url);
      const raw=await res.json();
      rows=raw.filter(r=>r['Duration (ms)']||r.durationMs).map(r=>({
        date:r.Date||r.date||'', category:r.Category||r.category||'',
        sub:r.Subcategory||r.subcategory||'', ms:Number(r['Duration (ms)']||r.durationMs||0)
      })).filter(r=>r.ms>0);
    } catch(e) {
      rows=sessionLog.map(s=>({date:s.date,category:s.category,sub:s.subcategory,ms:s.durationMs})).filter(r=>r.ms>0);
      if(!rows.length){ el.innerHTML='<div class="loading-state">Could not load Sheet data.<br>Check your URL in settings.</div>'; return; }
    }
    if(!rows.length){ el.innerHTML='<div class="loading-state">No sessions found yet.<br>Record some sessions first!</div>'; return; }
    buildDashboard(rows, el);
  }

  function buildDashboard(rows, el) {
    const totalMs=rows.reduce((s,r)=>s+r.ms,0);
    const avgMs=totalMs/rows.length;

    const byCat={};
    rows.forEach(r=>{
      if(!byCat[r.category]) byCat[r.category]={ms:0,count:0};
      byCat[r.category].ms+=r.ms; byCat[r.category].count++;
    });
    const sortedCats=Object.entries(byCat).sort((a,b)=>b[1].ms-a[1].ms);
    const maxCatMs=sortedCats[0]?.[1].ms||1;

    const bySub={};
    rows.forEach(r=>{
      const k=r.sub||r.category;
      if(!bySub[k]) bySub[k]={ms:0,cat:r.category};
      bySub[k].ms+=r.ms;
    });
    const topSubs=Object.entries(bySub).sort((a,b)=>b[1].ms-a[1].ms).slice(0,5);

    const byDay={};
    rows.forEach(r=>{ byDay[r.date]=(byDay[r.date]||0)+1; });
    const dayKeys=Object.keys(byDay).slice(-7);

    const dates=rows.map(r=>r.date).filter(Boolean);
    document.getElementById('analyticsRange').textContent=
      dates.length>1?`${dates[dates.length-1]} – ${dates[0]}`:dates[0]||'';

    el.innerHTML=`
      <div class="stat-grid">
        <div class="stat-cell"><div class="sl">Total time</div><div class="sv">${fmtHrs(totalMs)}</div><div class="ss">all sessions</div></div>
        <div class="stat-cell"><div class="sl">Sessions</div><div class="sv">${rows.length}</div><div class="ss">recorded</div></div>
        <div class="stat-cell"><div class="sl">Avg session</div><div class="sv">${fmtHrs(avgMs)}</div><div class="ss">per work block</div></div>
        <div class="stat-cell"><div class="sl">Top category</div><div class="sv" style="font-size:15px;font-family:'Syne',sans-serif;">${sortedCats[0]?.[0]||'—'}</div><div class="ss">${sortedCats[0]?fmtHrs(sortedCats[0][1].ms)+' logged':''}</div></div>
      </div>

      <div class="chart-card">
        <div class="chart-title">Time by category</div>
        ${sortedCats.map(([cat,val])=>`
          <div class="bar-row">
            <div class="bar-label"><span>${cat}</span><span>${fmtHrs(val.ms)} · ${val.count} session${val.count!==1?'s':''}</span></div>
            <div class="bar-track"><div class="bar-fill" style="width:${Math.round(val.ms/maxCatMs*100)}%;background:${colorFor(cat)}"></div></div>
          </div>`).join('')}
      </div>

      <div class="chart-card">
        <div class="chart-title">Top tasks by time</div>
        ${topSubs.map(([sub,val])=>`
          <div class="bar-row">
            <div class="bar-label"><span>${sub}</span><span>${fmtHrs(val.ms)}</span></div>
            <div class="bar-track"><div class="bar-fill" style="width:${Math.round(val.ms/topSubs[0][1].ms*100)}%;background:${colorFor(val.cat)}"></div></div>
          </div>`).join('')}
      </div>

      <div class="chart-card">
        <div class="chart-title">Sessions per day (last 7 days)</div>
        <div class="chart-wrap"><canvas id="lineChart"></canvas></div>
      </div>

      <div class="chart-card">
        <div class="chart-title">Category split</div>
        <div class="donut-wrap">
          <canvas class="donut-canvas" id="donutChart" width="140" height="140"></canvas>
          <div class="donut-legend">
            ${sortedCats.map(([cat,val])=>`
              <div class="legend-row">
                <div class="legend-dot" style="background:${colorFor(cat)}"></div>
                <span style="font-size:12px;">${cat}</span>
                <span style="font-size:11px;color:var(--muted);margin-left:auto;font-family:'DM Mono',monospace;">${Math.round(val.ms/totalMs*100)}%</span>
              </div>`).join('')}
          </div>
        </div>
      </div>
    `;

    const lineCtx=document.getElementById('lineChart').getContext('2d');
    const lc=new Chart(lineCtx,{
      type:'line',
      data:{
        labels:dayKeys,
        datasets:[{data:dayKeys.map(d=>byDay[d]||0),borderColor:'#1D9E75',backgroundColor:'rgba(29,158,117,0.08)',tension:0.4,fill:true,pointBackgroundColor:'#4ecba0',pointRadius:4}]
      },
      options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{
        x:{ticks:{color:'#555250',font:{size:10}},grid:{color:'rgba(255,255,255,0.04)'}},
        y:{ticks:{color:'#555250',font:{size:10},stepSize:1},grid:{color:'rgba(255,255,255,0.04)'},beginAtZero:true}
      }}
    });
    chartInstances.push(lc);

    const donutCtx=document.getElementById('donutChart').getContext('2d');
    const dc=new Chart(donutCtx,{
      type:'doughnut',
      data:{
        labels:sortedCats.map(([c])=>c),
        datasets:[{data:sortedCats.map(([,v])=>Math.round(v.ms/60000)),backgroundColor:sortedCats.map(([c])=>colorFor(c)),borderWidth:0}]
      },
      options:{responsive:false,cutout:'68%',plugins:{legend:{display:false},tooltip:{callbacks:{label:ctx=>` ${fmtHrs(sortedCats[ctx.dataIndex][1].ms)}`}}}}
    });
    chartInstances.push(dc);
  }

  if('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js');
</script>
</body>
</html>
